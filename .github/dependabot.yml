updates:
- directory: /
  groups:
    analyzers:
      patterns:
      - Microsoft.CodeAnalysis*
    benchmarks:
      patterns:
      - BenchmarkDotNet*
      - ObjectLayoutInspector
    dotnet-libraries:
      patterns:
      - Microsoft.Bcl.*
      - System.*
    stylecop:
      patterns:
      - StyleCop.*
    test-dependencies:
      patterns:
      - xunit.*
      - NSubstitute
      - coverlet.*
      - Microsoft.NET.Test.Sdk
      - Microsoft.Testing.Extensions.*
      - NuGet.*
  package-ecosystem: nuget
  schedule:
    interval: daily
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: daily
version: 2
